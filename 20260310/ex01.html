<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
  </head>
  <body>
    <div class="container">
        <div class="row"> <!-- 행 (가로) -->
            <div class="col" style="background-color: rgb(100,100,100);" ><h1>첫번째</h1></div>
            <div class="col" style="background-color: rgb(200,100,0);"><h1>두번째</h1></div>
            <div class="col" style="background-color: rgb(200,0,100);"><h1>세번째</h1></div>
            <div class="col" style="background-color: rgb(150,150,200);"><h1>네번째</h1></div>
            
        </div>
        <div class="row">
            <div class= "col">
                <button class="btn btn-primary" style="margin: 1rem;">로그인</button>
            </div>
        </div>
    </div>
    <div class="container"> <!-- 화면에 맞게 크기 조절 -->
        <h1>구역</h1>
        <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Odio tempore autem minus eius quidem tempora distinctio delectus hic aut corrupti explicabo modi quos, fugiat voluptatibus quisquam vitae minima quo suscipit.</p>
        <!-- 화면에 맞게 글자 배치 조정 -->
    </div>
    <h1>Hello, world!</h1>
    <table class="table">
        <tr> <!--행 (가로)-->
            <td>1번</td> <!-- 열 (세로) -->
            <td>2번</td>
        </tr>
        <tr class="table-secondary">
            <td>열1</td><td>열2</td><td>열3</td>
        </tr>
        <tr class="table-primary">
            <td>열1</td><td>열2</td><td>열3</td>
        </tr>
        <tr class="table-success">
            <td>열1</td><td>열2</td><td>열3</td>
        </tr>

        <!-- table 표 행-->
    </table>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
  </body>
</html>
